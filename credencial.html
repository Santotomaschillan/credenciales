<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Credencial Digital — Santo Tomás</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:#1b4332;
  background-image:linear-gradient(135deg,#1b4332 0%,#2d6a4f 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'DM Sans',Arial,sans-serif;padding:24px;
}
.card{
  background:#fff;border-radius:24px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  max-width:360px;width:100%;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ── HEADER ── */
.hdr{
  background:#1b4332;
  padding:24px 20px 32px;
  text-align:center;
  position:relative;
}
.hdr::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:22px;background:#fff;border-radius:22px 22px 0 0;
}
.empresa{
  font-size:14px;font-weight:700;color:#fff;
  letter-spacing:.4px;text-transform:uppercase;margin-bottom:16px;
}
.avatar{
  width:110px;height:110px;border-radius:50%;
  border:4px solid rgba(255,255,255,.3);
  overflow:hidden;margin:0 auto;
  display:flex;align-items:center;justify-content:center;
  font-size:40px;font-weight:700;color:#fff;
  box-shadow:0 6px 20px rgba(0,0,0,.3);
  position:relative;z-index:1;
}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}

/* ── BODY ── */
.body{padding:22px 22px 16px;text-align:center}
.nombre{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:4px;line-height:1.3}
.cargo{font-size:13px;color:#555;margin-bottom:10px;line-height:1.4;font-style:italic}
.dept-pill{
  display:inline-block;background:#1b4332;color:#fff;
  font-size:10px;font-weight:600;padding:4px 14px;
  border-radius:20px;margin-bottom:14px;letter-spacing:.3px;text-transform:uppercase;
}
.separador{height:1px;background:#efefef;margin-bottom:12px}
.info-fila{
  display:flex;align-items:flex-start;gap:10px;
  font-size:13px;color:#444;margin-bottom:8px;text-align:left;
}
.info-etiq{
  font-size:10px;color:#aaa;min-width:58px;text-align:right;
  flex-shrink:0;text-transform:uppercase;letter-spacing:.3px;padding-top:1px;
}
.info-val{word-break:break-all;line-height:1.35}

/* ── FOOTER ── */
.footer{
  background:#1b4332;padding:10px 18px;
  text-align:center;font-size:9px;
  color:rgba(255,255,255,.7);letter-spacing:.6px;text-transform:uppercase;
}

/* ── LOADING / ERROR ── */
.msg{padding:48px 28px;text-align:center;font-size:14px;color:#666;line-height:2}
.skel{
  background:linear-gradient(90deg,#f0f0f0 25%,#e6e6e6 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:skel 1.4s infinite;
  border-radius:6px;height:13px;margin:7px auto;
}
@keyframes skel{from{background-position:200% 0}to{background-position:-200% 0}}
</style>
</head>
<body>

<div class="card" id="card">
  <div class="msg">
    <div style="font-size:32px;margin-bottom:14px">🪪</div>
    <div class="skel" style="width:55%"></div>
    <div class="skel" style="width:36%"></div>
    <div class="skel" style="width:62%"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// CONFIGURACIÓN — solo edita estas variables si cambia algo
// ─────────────────────────────────────────────────────────
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROi5hGE9A3sfi3SuavKb_bpmpF_Rr6z-QgNC5l3W65kPO2svUSKic3qDqvd0dEvw/pub?gid=1073792939&single=true&output=csv';
var EMPRESA = 'Santo Tomás';
var FOOTER  = 'Identificación interna — No transferible';
// ─────────────────────────────────────────────────────────

function param(n){ return new URLSearchParams(location.search).get(n); }

function iniciales(n){
  if(!n) return '?';
  return n.trim().split(/\s+/).slice(0,2).map(function(w){return(w[0]||'').toUpperCase();}).join('');
}

var PALETA = ['#2d6a4f','#1e6091','#7b2d8b','#b5451b','#1a535c','#4a4e69','#c77dff','#0077b6'];
function colorId(id){
  var h=0, s=String(id);
  for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))&0xffff;
  return PALETA[h%PALETA.length];
}

// ── CSV parser ──────────────────────────────────────────
function parseFila(linea){
  var campos=[],actual='',enQ=false;
  for(var i=0;i<linea.length;i++){
    var c=linea[i];
    if(c==='"'){ if(enQ&&linea[i+1]==='"'){actual+='"';i++;} else enQ=!enQ; }
    else if(c===','&&!enQ){ campos.push(actual.trim()); actual=''; }
    else actual+=c;
  }
  campos.push(actual.trim());
  return campos;
}

function parseCSV(texto){
  texto = texto.replace(/^\uFEFF/,''); // quitar BOM
  var lineas = texto.split(/\r\n|\n|\r/).filter(function(l){return l.trim()!=='';});
  if(lineas.length<2) return {enc:[],filas:[]};
  var enc = parseFila(lineas[0]).map(function(h){return h.replace(/"/g,'').trim().toLowerCase();});
  var filas = [];
  for(var i=1;i<lineas.length;i++){
    var vals=parseFila(lineas[i]), obj={};
    for(var j=0;j<enc.length;j++) obj[enc[j]]=(vals[j]||'').replace(/"/g,'').trim();
    filas.push(obj);
  }
  return {enc:enc, filas:filas};
}

function buscarCol(enc, candidatos){
  for(var ci=0;ci<candidatos.length;ci++)
    for(var hi=0;hi<enc.length;hi++)
      if(enc[hi].indexOf(candidatos[ci])!==-1) return enc[hi];
  return null;
}

function get(emp, enc, candidatos){
  var c=buscarCol(enc,candidatos);
  return c ? (emp[c]||'') : '';
}

// ── Error display ───────────────────────────────────────
function error(titulo, detalle, icono){
  document.getElementById('card').innerHTML =
    '<div class="msg">'
    +'<div style="font-size:32px;margin-bottom:10px">'+(icono||'⚠️')+'</div>'
    +'<strong style="display:block;margin-bottom:6px;color:#333;font-size:15px">'+titulo+'</strong>'
    +'<span style="font-size:13px;color:#888">'+detalle+'</span>'
    +'</div>';
}

// ── Main ────────────────────────────────────────────────
async function cargar(){
  var id = param('id');
  if(!id){ error('Sin ID','Agrega <b>?id=5</b> al final de la URL','🔍'); return; }

  var texto='';
  try{
    // fetch directo (funciona desde GitHub Pages con Google Sheets publicado)
    var r = await fetch(CSV_URL+'&nocache='+Date.now(), {cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    texto = await r.text();
  }catch(e1){
    // fallback via proxy si hay problema CORS
    try{
      var rp = await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(CSV_URL));
      if(!rp.ok) throw new Error('proxy '+rp.status);
      texto = (await rp.json()).contents||'';
    }catch(e2){
      error(
        'Error al cargar',
        'No se pudo obtener los datos.<br>'
        +'<small style="color:#aaa">'+e1.message+'</small><br>'
        +'<small style="color:#bbb">Verifica que el Sheet esté publicado públicamente como CSV.</small>',
        '⚠️'
      );
      return;
    }
  }

  if(!texto||texto.length<10){ error('Sin datos','El CSV está vacío.','⚠️'); return; }

  var csv = parseCSV(texto);
  var enc = csv.enc, filas = csv.filas;

  if(!filas.length){ error('Sin filas','La planilla no tiene datos.','📭'); return; }

  // buscar empleado por coincidencia exacta de ID en cualquier columna
  var emp=null;
  for(var fi=0;fi<filas.length;fi++){
    var vals=Object.values(filas[fi]);
    for(var vi=0;vi<vals.length;vi++){
      if(String(vals[vi]).trim()===String(id).trim()){ emp=filas[fi]; break; }
    }
    if(emp) break;
  }
  if(!emp){ error('No encontrado','El ID <b>'+id+'</b> no existe en la planilla.','🔍'); return; }

  var nombre   = get(emp,enc,['nombre','name','trabajador','empleado']);
  var cargo    = get(emp,enc,['cargo','puesto','position','title','rol']);
  var dept     = get(emp,enc,['departamento','depart','area','piso','sector','division']);
  var email    = get(emp,enc,['email','mail','correo']);
  var telefono = get(emp,enc,['telefono','tel','phone','celular','movil','fono']);
  var foto     = get(emp,enc,['foto_url','foto','photo','imagen','picture','avatar']);

  var col  = colorId(id);
  var ini  = iniciales(nombre);
  var av   = (foto && foto.indexOf('http')===0)
    ? '<img src="'+foto+'" alt="'+ini+'" onerror="this.outerHTML=\''+ini+'\'">'
    : ini;

  var card = document.getElementById('card');
  card.innerHTML =
    '<div class="hdr">'
      +'<div class="empresa">'+EMPRESA+'</div>'
      +'<div class="avatar" style="background:'+col+'">'+av+'</div>'
    +'</div>'
    +'<div class="body">'
      +'<div class="nombre">'+nombre+'</div>'
      +'<div class="cargo">'+cargo+'</div>'
      +(dept?'<div class="dept-pill">'+dept+'</div>':'')
      +'<div class="separador"></div>'
      +(email    ?'<div class="info-fila"><span class="info-etiq">Email</span><span class="info-val">'+email+'</span></div>':'')
      +(telefono ?'<div class="info-fila"><span class="info-etiq">Teléfono</span><span class="info-val">'+telefono+'</span></div>':'')
    +'</div>'
    +'<div class="footer">'+FOOTER+'</div>';
}

cargar();
</script>
</body>
</html>

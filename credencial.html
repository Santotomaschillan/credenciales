<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Credencial Digital — Santo Tomás.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f0f2ff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',Arial,sans-serif;padding:20px}
.card{background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.25);max-width:360px;width:100%;animation:su .35s ease}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.hdr{background:#1b4332;padding:28px 24px 38px;text-align:center;position:relative}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:20px;background:#fff;border-radius:20px 20px 0 0}
.co{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px}
.co span{font-size:13px;font-weight:700;color:#ffffff;letter-spacing:.3px;text-transform:uppercase}
.logo{height:24px;object-fit:contain}
.av{width:106px;height:106px;border-radius:50%;border:4px solid rgba(255,255,255,.25);overflow:hidden;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:700;color:#fff;position:relative;z-index:1;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.body{padding:26px 22px 18px;text-align:center}
.name{font-size:19px;font-weight:700;color:#1a1a2e;margin-bottom:4px;line-height:1.25}
.role{font-size:13px;color:#555;margin-bottom:12px;line-height:1.4;font-style:italic}
.dept{display:inline-block;background:#1b4332;color:#ffffff;font-size:10px;font-weight:600;padding:4px 14px;border-radius:20px;margin-bottom:16px;letter-spacing:.3px;text-transform:uppercase}
.divider{height:1px;background:#f0f0f0;margin-bottom:14px}
.ir{display:flex;align-items:center;gap:10px;font-size:13px;color:#444;margin-bottom:9px;text-align:left}
.lbl{font-size:10px;color:#aaa;min-width:52px;text-align:right;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px}
.iv{word-break:break-all;line-height:1.3}
.footer{background:#1b4332;padding:11px 20px;text-align:center;font-size:9px;color:#ffffff;letter-spacing:.5px;text-transform:uppercase;opacity:.85}
.msg{padding:50px 30px;text-align:center;font-size:14px;color:#666;line-height:2}
.skel{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:6px;height:14px;margin:6px auto}
@keyframes sk{from{background-position:200% 0}to{background-position:-200% 0}}
</style></head><body>
<div class="card" id="card">
  <div class="msg"><div style="font-size:28px;margin-bottom:14px">&#x1FAA6;</div>
  <div class="skel" style="width:55%"></div>
  <div class="skel" style="width:35%"></div>
  <div class="skel" style="width:65%"></div></div>
</div>
<script>
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROi5hGE9A3...pub?output=csv';
var EMPRESA = 'Santo Tomás.';
var FOOTER  = 'Instituciones Santo Tomás ';
var LOGO_URL = '';

function getParam(n){return new URLSearchParams(window.location.search).get(n);}
function iniciales(n){if(!n)return'?';return n.trim().split(/\s+/).slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase();}
var PAL=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#0ea5e9','#14b8a6'];
function colorId(id){var h=0,s=String(id);for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))&0xffff;}return PAL[h%PAL.length];}
function parseFila(l){var f=[],c="",q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===","&&!q){f.push(c.trim());c="";}else c+=ch;}f.push(c.trim());return f;}
function parseCSV(t){t=t.replace(/^\uFEFF/,"");var ls=t.split(/\r\n|\n|\r/).filter(function(x){return x.trim()!=="";});if(ls.length<2)return{h:[],r:[]};var h=parseFila(ls[0]).map(function(x){return x.replace(/"/g,"").trim().toLowerCase();});var r=[];for(var i=1;i<ls.length;i++){var v=parseFila(ls[i]),o={};for(var j=0;j<h.length;j++){o[h[j]]=(v[j]||"").replace(/"/g,"").trim();}r.push(o);}return{h:h,r:r};}
function buscar(h,cs){for(var ci=0;ci<cs.length;ci++){for(var hi=0;hi<h.length;hi++){if(h[hi].indexOf(cs[ci])!==-1)return h[hi];}}return null;}
function val(emp,h,cs){var c=buscar(h,cs);return c?(emp[c]||""):"";}
function error(t,d,ic){document.getElementById("card").innerHTML='<div class="msg"><div style="font-size:28px;margin-bottom:10px">'+(ic||"⚠️")+'</div><strong style="display:block;margin-bottom:6px;color:#333;font-size:15px">'+t+'</strong><span style="font-size:13px;color:#888">'+d+'</span></div>';}
async function cargar(){
  var id=getParam("id");
  if(!id){error("Sin ID","Agrega ?id=5 al final de la URL","&#x1F50D;");return;}
  var txt="";
  try{var r=await fetch(CSV_URL+"&t="+Date.now());if(!r.ok)throw new Error("HTTP "+r.status);txt=await r.text();}
  catch(e1){try{var rp=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(CSV_URL));if(!rp.ok)throw new Error("proxy "+rp.status);txt=(await rp.json()).contents||"";}
  catch(e2){error("Error de red",e1.message+"<br><small>Verifica que el Sheet esté publicado como CSV público</small>","⚠️");return;}}
  if(!txt||txt.length<10){error("Datos vacíos","El CSV está vacío","⚠️");return;}
  var csv=parseCSV(txt),h=csv.h,filas=csv.r;
  var emp=null;for(var fi=0;fi<filas.length;fi++){var vs=Object.values(filas[fi]);for(var vi=0;vi<vs.length;vi++){if(String(vs[vi]).trim()===String(id).trim()){emp=filas[fi];break;}}if(emp)break;}
  if(!emp){error("No encontrado","El ID <b>"+id+"</b> no existe en la planilla","&#x1F50D;");return;}
  var nombre=val(emp,h,['nombre','name','trabajador','empleado']);
  var cargo=val(emp,h,['cargo','puesto','position','title','rol']);
  var dept=val(emp,h,['departamento','depart','area','piso','sector','division']);
  var email=val(emp,h,['email','mail','correo']);
  var telefono=val(emp,h,['telefono','tel','phone','celular','movil','fono']);
  var foto=val(emp,h,['foto_url','foto','photo','imagen','picture','avatar']);
  var col=colorId(id),ini=iniciales(nombre);
  var av=(foto&&foto.indexOf('http')===0)?'<img src="'+foto+'" alt="'+nombre+'" onerror="this.outerHTML=\''+ini+'\'">'  :ini;
  var logoH=(LOGO_URL&&LOGO_URL.indexOf('http')===0)?'<img src="'+LOGO_URL+'" class="logo" onerror="this.style.display=\'none\'">':'';
  document.getElementById("card").innerHTML=
    '<div class="hdr"><div class="co">'+logoH+'<span>'+EMPRESA+'</span></div>'
    +'<div class="av" style="background:'+col+'">'+av+'</div></div>'
    +'<div class="body">'
    +'<div class="name">'+nombre+'</div>'
    +'<div class="role">'+cargo+'</div>'
    +(dept?'<div class="dept">'+dept+'</div>':'')+'<div class="divider"></div>'
    +(email?'<div class="ir"><span class="lbl">Email</span><span class="iv">'+email+'</span></div>':''  )
    +(telefono?'<div class="ir"><span class="lbl">Teléfono</span><span class="iv">'+telefono+'</span></div>':''  )
    +'</div><div class="footer">'+FOOTER+'</div>';
}
cargar();
</script></body></html>

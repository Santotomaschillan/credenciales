<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Credencial Digital</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',Arial,sans-serif;padding:20px}
.card{background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.35);max-width:360px;width:100%;animation:su .35s ease}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.hdr{background:#1a1a2e;padding:28px 24px 38px;text-align:center;position:relative}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:20px;background:#fff;border-radius:20px 20px 0 0}
.co{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px}
.co span{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px;text-transform:uppercase}
.logo{height:24px;object-fit:contain}
.av{width:106px;height:106px;border-radius:50%;border:4px solid rgba(255,255,255,.25);overflow:hidden;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:700;color:#fff;position:relative;z-index:1;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.av img{width:100%;height:100%;object-fit:cover;display:block}
.body{padding:26px 22px 18px;text-align:center}
.name{font-size:19px;font-weight:700;color:#1a1a2e;margin-bottom:4px;line-height:1.25}
.role{font-size:13px;color:#555;margin-bottom:12px;line-height:1.4;font-style:italic}
.dept{display:inline-block;background:#1a1a2e;color:#fff;font-size:10px;font-weight:600;padding:4px 14px;border-radius:20px;margin-bottom:16px;letter-spacing:.3px;text-transform:uppercase}
.divider{height:1px;background:#f0f0f0;margin-bottom:14px}
.ir{display:flex;align-items:center;gap:10px;font-size:13px;color:#444;margin-bottom:9px;text-align:left}
.lbl{font-size:10px;color:#aaa;min-width:52px;text-align:right;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px}
.iv{word-break:break-all;line-height:1.3}
.footer{background:#1a1a2e;padding:11px 20px;text-align:center;font-size:9px;color:rgba(255,255,255,.7);letter-spacing:.5px;text-transform:uppercase}
.msg{padding:50px 30px;text-align:center;font-size:14px;color:#666;line-height:2}
.skel{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:sk 1.4s infinite;border-radius:6px;height:14px;margin:6px auto}
@keyframes sk{from{background-position:200% 0}to{background-position:-200% 0}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="msg">
    <div style="font-size:28px;margin-bottom:14px">🪪</div>
    <div class="skel" style="width:55%"></div>
    <div class="skel" style="width:35%"></div>
    <div class="skel" style="width:65%"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURACIÓN — pega aquí la URL de tu Google Sheet como CSV
// Google Sheet → Archivo → Publicar en la web → Hoja1 → CSV → Publicar → copiar URL
// ═══════════════════════════════════════════════════════════════
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROi5hGE9A3sfi3SuavKb_bpmpF_Rr6z-QgNC5l3W65kPO2svUSKic3qDqvd0dEvw/pub?gid=1073792939&single=true&output=csv';
var EMPRESA = 'Santo Tomás';
var FOOTER  = 'Identificación interna — No transferible';
var COLOR_PRINCIPAL = '#1a1a2e';
// ═══════════════════════════════════════════════════════════════

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function iniciales(nombre) {
  if (!nombre) return '?';
  return nombre.trim().split(/\s+/).slice(0, 2).map(function(w){ return w[0] || ''; }).join('').toUpperCase();
}

var COLORES = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#0ea5e9','#14b8a6'];
function colorPorId(id) {
  var h = 0;
  var s = String(id);
  for (var i = 0; i < s.length; i++) {
    h = (h * 31 + s.charCodeAt(i)) & 0xffff;
  }
  return COLORES[h % COLORES.length];
}

// Parses a single CSV row handling quoted fields correctly
function parsearFila(linea) {
  var campos = [];
  var actual = '';
  var enComilla = false;
  for (var i = 0; i < linea.length; i++) {
    var c = linea[i];
    if (c === '"') {
      if (enComilla && linea[i+1] === '"') { actual += '"'; i++; }
      else { enComilla = !enComilla; }
    } else if (c === ',' && !enComilla) {
      campos.push(actual.trim());
      actual = '';
    } else {
      actual += c;
    }
  }
  campos.push(actual.trim());
  return campos;
}

function parsearCSV(texto) {
  // Remove BOM if present
  texto = texto.replace(/^\uFEFF/, '');
  // Split by real newlines (works with \r\n, \n, \r)
  var lineas = texto.split(/\r\n|\n|\r/).filter(function(l){ return l.trim() !== ''; });
  if (lineas.length < 2) return { encabezados: [], filas: [] };
  var encabezados = parsearFila(lineas[0]).map(function(h){ return h.replace(/"/g, '').trim().toLowerCase(); });
  var filas = [];
  for (var i = 1; i < lineas.length; i++) {
    var vals = parsearFila(lineas[i]);
    var obj = {};
    for (var j = 0; j < encabezados.length; j++) {
      obj[encabezados[j]] = (vals[j] || '').replace(/"/g, '').trim();
    }
    filas.push(obj);
  }
  return { encabezados: encabezados, filas: filas };
}

function buscarColumna(encabezados, candidatos) {
  for (var ci = 0; ci < candidatos.length; ci++) {
    for (var hi = 0; hi < encabezados.length; hi++) {
      if (encabezados[hi].indexOf(candidatos[ci]) !== -1) {
        return encabezados[hi];
      }
    }
  }
  return null;
}

function obtenerValor(empleado, encabezados, candidatos) {
  var col = buscarColumna(encabezados, candidatos);
  return col ? (empleado[col] || '') : '';
}

function mostrarError(titulo, detalle, icono) {
  document.getElementById('card').innerHTML =
    '<div class="msg">'
    + '<div style="font-size:28px;margin-bottom:10px">' + (icono || '⚠️') + '</div>'
    + '<strong style="display:block;margin-bottom:6px;color:#333;font-size:15px">' + titulo + '</strong>'
    + '<span style="font-size:13px;color:#888">' + detalle + '</span>'
    + '</div>';
}

async function cargar() {
  var id = getParam('id');
  if (!id) {
    mostrarError('Sin ID de empleado', 'Agrega <b>?id=5</b> al final de la URL en el navegador.', '🔍');
    return;
  }
  if (!CSV_URL || CSV_URL === 'https://docs.google.com/spreadsheets/d/e/2PACX-1vROi5hGE9A3sfi3SuavKb_bpmpF_Rr6z-QgNC5l3W65kPO2svUSKic3qDqvd0dEvw/pub?gid=1073792939&single=true&output=csv') {
    mostrarError('Sin configurar', 'Edita este archivo y reemplaza <b>CSV_URL</b> con la URL de tu Google Sheet.', '⚙️');
    return;
  }

  var texto = '';
  try {
    // Intentar fetch directo primero
    var resp = await fetch(CSV_URL + '&t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    texto = await resp.text();
  } catch (errorDirecto) {
    // Fallback: proxy para evitar problemas de CORS
    try {
      var proxyResp = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(CSV_URL));
      if (!proxyResp.ok) throw new Error('Proxy HTTP ' + proxyResp.status);
      var proxyData = await proxyResp.json();
      texto = proxyData.contents || '';
    } catch (errorProxy) {
      mostrarError(
        'Error al cargar datos',
        'No se pudo conectar con Google Sheets.<br>'
        + '<small>Error: ' + errorDirecto.message + '</small><br>'
        + '<small>Verifica que el Sheet esté publicado como público en formato CSV.</small>',
        '⚠️'
      );
      return;
    }
  }

  if (!texto || texto.length < 10) {
    mostrarError('Datos vacíos', 'El CSV descargado está vacío. Verifica que la URL sea correcta.', '⚠️');
    return;
  }

  var resultado = parsearCSV(texto);
  var encabezados = resultado.encabezados;
  var filas = resultado.filas;

  if (!filas.length) {
    mostrarError('Sin datos', 'No se encontraron filas en la planilla.', '📭');
    return;
  }

  // Buscar al empleado — comparar el ID con cualquier columna
  var empleado = null;
  for (var fi = 0; fi < filas.length; fi++) {
    var fila = filas[fi];
    var valores = Object.values(fila);
    for (var vi = 0; vi < valores.length; vi++) {
      if (String(valores[vi]).trim() === String(id).trim()) {
        empleado = fila;
        break;
      }
    }
    if (empleado) break;
  }

  if (!empleado) {
    mostrarError(
      'Empleado no encontrado',
      'El ID <b>' + id + '</b> no existe en la planilla.<br><small>Verifica que el número sea correcto.</small>',
      '🔍'
    );
    return;
  }

  // Extraer campos
  var nombre   = obtenerValor(empleado, encabezados, ['nombre', 'name', 'trabajador', 'empleado']);
  var cargo    = obtenerValor(empleado, encabezados, ['cargo', 'puesto', 'position', 'title', 'rol']);
  var dept     = obtenerValor(empleado, encabezados, ['departamento', 'depart', 'area', 'piso', 'sector', 'division']);
  var email    = obtenerValor(empleado, encabezados, ['email', 'mail', 'correo']);
  var telefono = obtenerValor(empleado, encabezados, ['telefono', 'tel', 'phone', 'celular', 'movil', 'fono']);
  var foto     = obtenerValor(empleado, encabezados, ['foto_url', 'foto', 'photo', 'imagen', 'picture', 'avatar']);

  var color = colorPorId(id);
  var ini = iniciales(nombre);
  var avatarHTML = (foto && foto.indexOf('http') === 0)
    ? '<img src="' + foto + '" alt="' + nombre + '" onerror="this.outerHTML=\'' + ini + '\'">'
    : ini;

  // Aplicar color dinámico al header y dept
  var tarjeta = document.getElementById('card');
  tarjeta.innerHTML =
    '<div class="hdr" style="background:' + COLOR_PRINCIPAL + '">'
    + '<div class="co"><span>' + EMPRESA + '</span></div>'
    + '<div class="av" style="background:' + color + '">' + avatarHTML + '</div>'
    + '</div>'
    + '<div class="body">'
    + '<div class="name">' + nombre + '</div>'
    + '<div class="role">' + cargo + '</div>'
    + (dept ? '<div class="dept" style="background:' + COLOR_PRINCIPAL + '">' + dept + '</div>' : '')
    + '<div class="divider"></div>'
    + (email    ? '<div class="ir"><span class="lbl">Email</span><span class="iv">' + email + '</span></div>' : '')
    + (telefono ? '<div class="ir"><span class="lbl">Teléfono</span><span class="iv">' + telefono + '</span></div>' : '')
    + '</div>'
    + '<div class="footer" style="background:' + COLOR_PRINCIPAL + '">' + FOOTER + '</div>';

  // Apply color to hdr::after pseudo-element via inline style override
  var style = document.createElement('style');
  style.textContent = '.hdr::after{background:#fff}';
  document.head.appendChild(style);
}

cargar();
</script>
</body>
</html>
